<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miano Clinical Sexology — Ads Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
  }

  header {
    background: #3d5a4c;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 {
    color: #fff;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  header p {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-top: 2px;
  }

  .top-bar {
    background: #fff;
    border-bottom: 0.5px solid #dddbd3;
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .top-bar label {
    font-size: 13px;
    color: #7a7265;
    white-space: nowrap;
  }
  .top-bar input[type="date"] {
    font-size: 13px;
    padding: 5px 10px;
    border: 0.5px solid #c8c6bf;
    border-radius: 6px;
    background: #faf9f7;
    color: #1a1a18;
    cursor: pointer;
  }
  .top-bar input[type="date"]:focus {
    outline: 2px solid #3d5a4c;
    outline-offset: 1px;
  }
  .apply-btn {
    padding: 6px 18px;
    background: #3d5a4c;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .apply-btn:hover { background: #2e4439; }
  .apply-btn:disabled { background: #9aafaa; cursor: not-allowed; }

  .quick-ranges {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }
  .quick-btn {
    padding: 5px 12px;
    font-size: 12px;
    border: 0.5px solid #c8c6bf;
    border-radius: 6px;
    background: #fff;
    color: #5a5850;
    cursor: pointer;
    transition: all 0.1s;
  }
  .quick-btn:hover, .quick-btn.active {
    background: #eef2f0;
    border-color: #3d5a4c;
    color: #3d5a4c;
  }

  .main { padding: 1.75rem 2rem; max-width: 1200px; margin: 0 auto; }

  #status-bar {
    font-size: 13px;
    color: #7a7265;
    margin-bottom: 1.25rem;
    min-height: 20px;
  }
  #status-bar.error { color: #a32d2d; }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.75rem;
  }
  .metric-card {
    background: #fff;
    border: 0.5px solid #dddbd3;
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }
  .metric-card .label {
    font-size: 12px;
    color: #7a7265;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .metric-card .value {
    font-size: 26px;
    font-weight: 500;
    color: #1a1a18;
    line-height: 1.1;
  }
  .metric-card .delta {
    font-size: 12px;
    margin-top: 4px;
    color: #7a7265;
  }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
  }
  .chart-card {
    background: #fff;
    border: 0.5px solid #dddbd3;
    border-radius: 10px;
    padding: 1.25rem 1.5rem 1rem;
  }
  .chart-card h3 {
    font-size: 14px;
    font-weight: 500;
    color: #3d5a4c;
    margin-bottom: 1rem;
  }
  .chart-wrap {
    position: relative;
    width: 100%;
    height: 220px;
  }



  .loader {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #7a7265;
    padding: 2rem 0;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #dddbd3;
    border-top-color: #3d5a4c;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .skeleton {
    background: linear-gradient(90deg, #f0ede8 25%, #e8e5e0 50%, #f0ede8 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  @media (max-width: 640px) {
    header, .top-bar, .main { padding-left: 1rem; padding-right: 1rem; }
    .quick-ranges { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Miano Clinical Sexology</h1>
    <p>Google Ads performance dashboard</p>
  </div>
  <div id="last-updated" style="font-size:12px; color:rgba(255,255,255,0.5);"></div>
</header>

<div class="top-bar">
  <label for="date-from">From</label>
  <input type="date" id="date-from">
  <label for="date-to">To</label>
  <input type="date" id="date-to">
  <button class="apply-btn" id="load-btn" onclick="loadData()">Load data</button>
  <div class="quick-ranges">
    <button class="quick-btn" onclick="setRange(7, this)">7d</button>
    <button class="quick-btn active" onclick="setRange(30, this)">30d</button>
    <button class="quick-btn" onclick="setRange(60, this)">60d</button>
    <button class="quick-btn" onclick="setRange(90, this)">90d</button>
  </div>
</div>

<div class="main">



  <div id="status-bar"></div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    Fetching data from Google Sheets…
  </div>

  <div id="dashboard" style="display:none;">
    <div class="metrics-grid" id="metrics-grid"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Clicks per day</h3>
        <div class="chart-wrap"><canvas id="chart-clicks" role="img" aria-label="Daily clicks over selected date range"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Conversions per day</h3>
        <div class="chart-wrap"><canvas id="chart-conv" role="img" aria-label="Daily conversions over selected date range"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Spend per day ($)</h3>
        <div class="chart-wrap"><canvas id="chart-spend" role="img" aria-label="Daily spend over selected date range"></canvas></div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SHEET_ID = '19hSIR_R6chkVcCcqvI7IIf31kM4gKaWaOSoQXnlUGE0';
const API_KEY  = 'AIzaSyBnqU-K9_nVT9QTl7EQ73AxUXQmJ9oqrC4';
const DAILY_SHEET = 'Daily';
const OVERVIEW_SHEET = 'Overview';

let charts = {};

// ── Init dates ──────────────────────────────────────────────
(function initDates() {
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - 30);
  document.getElementById('date-to').value = fmtInput(to);
  document.getElementById('date-from').value = fmtInput(from);
  loadData();
})();

function fmtInput(d) {
  return d.toISOString().slice(0, 10);
}

function setRange(days, btn) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - days);
  document.getElementById('date-to').value = fmtInput(to);
  document.getElementById('date-from').value = fmtInput(from);
  loadData();
}

function getApiKey() {
  return API_KEY;
}

function setStatus(msg, isError) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

// ── Fetch sheet range ───────────────────────────────────────
async function fetchRange(sheetName, rangeNotation) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('No API key set.');
  const range = encodeURIComponent(`${sheetName}!${rangeNotation}`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${apiKey}`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.values || [];
}

// ── Main load ───────────────────────────────────────────────
async function loadData() {
  const fromStr = document.getElementById('date-from').value;
  const toStr   = document.getElementById('date-to').value;
  if (!fromStr || !toStr) return setStatus('Select a date range.', true);

  const fromDate = new Date(fromStr);
  const toDate   = new Date(toStr);
  if (fromDate > toDate) return setStatus('Start date must be before end date.', true);

  document.getElementById('loader').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('load-btn').disabled = true;
  setStatus('');

  try {
    const [dailyRows, overviewRows] = await Promise.all([
      fetchRange(DAILY_SHEET, 'A:G'),
      fetchRange(OVERVIEW_SHEET, 'A:B'),
    ]);

    const daily = parseDailyRows(dailyRows, fromDate, toDate);
    const overview = parseOverview(overviewRows);

    renderMetrics(daily, overview);
    renderCharts(daily);

    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    setStatus(`Showing ${daily.length} days  ·  ${fromStr} → ${toStr}`);
  } catch (e) {
    setStatus('Error: ' + e.message, true);
  } finally {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('load-btn').disabled = false;
  }
}

// ── Parsers ─────────────────────────────────────────────────
function parseDailyRows(rows, fromDate, toDate) {
  if (!rows.length) return [];
  // first row is header: Date, Impressions, Clicks, CTR, Cost ($), Conversions, CPC ($)
  const data = rows.slice(1);
  return data
    .map(r => ({
      date:        r[0] || '',
      impressions: parseNum(r[1]),
      clicks:      parseNum(r[2]),
      ctr:         parseNum(r[3]),
      cost:        parseNum(r[4]),
      conversions: parseNum(r[5]),
      cpc:         parseNum(r[6]),
    }))
    .filter(r => {
      if (!r.date) return false;
      const d = new Date(r.date);
      return d >= fromDate && d <= toDate;
    })
    .sort((a, b) => a.date.localeCompare(b.date));
}

function parseOverview(rows) {
  const out = {};
  rows.forEach(r => {
    if (r[0] && r[1] !== undefined) out[r[0].trim()] = r[1];
  });
  return out;
}

function parseNum(v) {
  if (v === undefined || v === null || v === '') return 0;
  return parseFloat(String(v).replace(/[$,%]/g, '')) || 0;
}

// ── Metrics ─────────────────────────────────────────────────
function renderMetrics(daily, overview) {
  const totalImpressions = sum(daily, 'impressions');
  const totalClicks      = sum(daily, 'clicks');
  const totalCost        = sum(daily, 'cost');
  const totalConv        = sum(daily, 'conversions');
  const ctr              = totalImpressions > 0 ? (totalClicks / totalImpressions * 100) : 0;
  const cpc              = totalClicks > 0 ? (totalCost / totalClicks) : 0;
  const cpa              = totalConv > 0 ? (totalCost / totalConv) : 0;

  const cards = [
    { label: 'Impressions',  value: totalImpressions.toLocaleString() },
    { label: 'Clicks',       value: totalClicks.toLocaleString() },
    { label: 'CTR',          value: ctr.toFixed(2) + '%' },
    { label: 'Spend',        value: '$' + totalCost.toFixed(2) },
    { label: 'Conversions',  value: totalConv.toFixed(1) },
    { label: 'CPC',          value: '$' + cpc.toFixed(2) },
    { label: 'Cost per conv',value: totalConv > 0 ? '$' + cpa.toFixed(2) : '—' },
  ];

  document.getElementById('metrics-grid').innerHTML = cards.map(c => `
    <div class="metric-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
    </div>
  `).join('');
}

function sum(arr, key) {
  return arr.reduce((acc, r) => acc + (r[key] || 0), 0);
}

// ── Charts ──────────────────────────────────────────────────
const PALETTE = {
  clicks:  { line: '#3d5a4c', fill: 'rgba(61,90,76,0.08)' },
  conv:    { line: '#7a5c44', fill: 'rgba(122,92,68,0.08)' },
  spend:   { line: '#5a6e8a', fill: 'rgba(90,110,138,0.08)' },
};

function renderCharts(daily) {
  const labels = daily.map(r => fmtAxisDate(r.date));

  drawChart('chart-clicks', labels, daily.map(r => r.clicks),
    'Clicks', PALETTE.clicks, false);
  drawChart('chart-conv', labels, daily.map(r => parseFloat(r.conversions.toFixed(1))),
    'Conversions', PALETTE.conv, false);
  drawChart('chart-spend', labels, daily.map(r => parseFloat(r.cost.toFixed(2))),
    'Spend ($)', PALETTE.spend, true);
}

function drawChart(id, labels, data, label, pal, isCurrency) {
  if (charts[id]) { charts[id].destroy(); }

  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label,
        data,
        borderColor: pal.line,
        backgroundColor: pal.fill,
        borderWidth: 1.5,
        pointRadius: data.length > 45 ? 0 : 3,
        pointHoverRadius: 5,
        pointBackgroundColor: pal.line,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#dddbd3',
          borderWidth: 1,
          titleColor: '#7a7265',
          bodyColor: '#1a1a18',
          titleFont: { size: 11 },
          bodyFont: { size: 13, weight: '500' },
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (isCurrency) return ' $' + v.toFixed(2);
              return ' ' + (Number.isInteger(v) ? v.toLocaleString() : v.toFixed(1));
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { size: 11 },
            color: '#9a9790',
            maxRotation: 0,
            autoSkip: true,
            maxTicksLimit: 10,
          },
          border: { color: '#dddbd3' }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { size: 11 },
            color: '#9a9790',
            callback: v => isCurrency ? '$' + v.toFixed(0) : v.toLocaleString(),
          },
          border: { color: '#dddbd3' },
          beginAtZero: true,
        }
      }
    }
  });
}

function fmtAxisDate(str) {
  const d = new Date(str);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
</script>

</body>
</html>
