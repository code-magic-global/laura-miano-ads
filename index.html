<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miano Clinical Sexology — Ads Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }

  header { background: #3d5a4c; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  header h1 { color: #fff; font-size: 17px; font-weight: 500; letter-spacing: 0.01em; }
  header p { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 2px; }

  .top-bar { background: #fff; border-bottom: 0.5px solid #dddbd3; padding: 0.75rem 2rem; display: flex; flex-direction: column; gap: 0; }
  .top-bar-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .top-bar-row + .top-bar-row { margin-top: 0.6rem; padding-top: 0.6rem; border-top: 0.5px solid #eeecea; }
  .top-bar label { font-size: 13px; color: #7a7265; white-space: nowrap; }
  .top-bar input[type="date"] { font-size: 13px; padding: 5px 10px; border: 0.5px solid #c8c6bf; border-radius: 6px; background: #faf9f7; color: #1a1a18; cursor: pointer; }
  .top-bar input[type="date"]:focus { outline: 2px solid #3d5a4c; outline-offset: 1px; }

  .range-group { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .range-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .range-label.primary { background: rgba(61,90,76,0.1); color: #3d5a4c; }
  .range-label.secondary { background: rgba(90,110,138,0.1); color: #5a6e8a; }

  .compare-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #7a7265; cursor: pointer; padding: 5px 10px; border: 0.5px solid #c8c6bf; border-radius: 6px; background: #fff; transition: all 0.1s; user-select: none; }
  .compare-toggle:hover { border-color: #3d5a4c; color: #3d5a4c; }
  .compare-toggle.active { background: #eef2f0; border-color: #3d5a4c; color: #3d5a4c; }
  .compare-toggle input[type="checkbox"] { accent-color: #3d5a4c; cursor: pointer; }

  .apply-btn { padding: 6px 18px; background: #3d5a4c; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .apply-btn:hover { background: #2e4439; }
  .apply-btn:disabled { background: #9aafaa; cursor: not-allowed; }

  .quick-ranges { display: flex; gap: 6px; margin-left: auto; }
  .quick-btn { padding: 5px 12px; font-size: 12px; border: 0.5px solid #c8c6bf; border-radius: 6px; background: #fff; color: #5a5850; cursor: pointer; transition: all 0.1s; }
  .quick-btn:hover, .quick-btn.active { background: #eef2f0; border-color: #3d5a4c; color: #3d5a4c; }

  .main { padding: 1.75rem 2rem; max-width: 1200px; margin: 0 auto; }

  #status-bar { font-size: 13px; color: #7a7265; margin-bottom: 1.25rem; min-height: 20px; }
  #status-bar.error { color: #a32d2d; }

  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.75rem; }
  .metric-card { background: #fff; border: 0.5px solid #dddbd3; border-radius: 10px; padding: 1rem 1.25rem; }
  .metric-card .label { font-size: 12px; color: #7a7265; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .metric-card .value { font-size: 24px; font-weight: 500; color: #1a1a18; line-height: 1.1; }
  .metric-card .compare-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .metric-card .comp-val { font-size: 12px; color: #7a7265; }
  .metric-card .delta-badge { font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 4px; }
  .delta-badge.up { background: #eaf3de; color: #3b6d11; }
  .delta-badge.down { background: #fcebeb; color: #a32d2d; }
  .delta-badge.flat { background: #f1efe8; color: #7a7265; }

  .charts-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
  .chart-card { background: #fff; border: 0.5px solid #dddbd3; border-radius: 10px; padding: 1.25rem 1.5rem 1rem; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .chart-card h3 { font-size: 14px; font-weight: 500; color: #3d5a4c; }
  .chart-legend { display: flex; gap: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #7a7265; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { position: relative; width: 100%; height: 220px; }

  .loader { display: none; align-items: center; gap: 10px; font-size: 13px; color: #7a7265; padding: 2rem 0; }
  .spinner { width: 16px; height: 16px; border: 2px solid #dddbd3; border-top-color: #3d5a4c; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    header, .top-bar, .main { padding-left: 1rem; padding-right: 1rem; }
    .quick-ranges { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Miano Clinical Sexology</h1>
    <p>Google Ads performance dashboard</p>
  </div>
  <div id="last-updated" style="font-size:12px; color:rgba(255,255,255,0.5);"></div>
</header>

<div class="top-bar">
  <div class="top-bar-row">
    <div class="range-group">
      <span class="range-label primary">Period A</span>
      <label for="date-from">From</label>
      <input type="date" id="date-from" onchange="if(comparing) fillPeriodB()">
      <label for="date-to">To</label>
      <input type="date" id="date-to" onchange="if(comparing) fillPeriodB()">
    </div>
    <button class="compare-toggle" id="compare-toggle" onclick="toggleCompare()">
      <span id="compare-tick" style="font-size:14px;">☐</span> Compare
    </button>
    <button class="apply-btn" id="load-btn" onclick="loadData()">Load data</button>
    <div class="quick-ranges">
      <button class="quick-btn" onclick="setRange(7, this)">7d</button>
      <button class="quick-btn active" onclick="setRange(30, this)">30d</button>
      <button class="quick-btn" onclick="setRange(60, this)">60d</button>
      <button class="quick-btn" onclick="setRange(90, this)">90d</button>
    </div>
  </div>

  <div class="top-bar-row" id="compare-group" style="display:none;">
    <div class="range-group">
      <span class="range-label secondary">Period B</span>
      <label for="date-from-b">From</label>
      <input type="date" id="date-from-b">
      <label for="date-to-b">To</label>
      <input type="date" id="date-to-b">
      <span style="font-size:12px; color:#9a9790;">— edit dates then click Load data</span>
    </div>
  </div>
</div>

<div class="main">
  <div id="status-bar"></div>
  <div class="loader" id="loader"><div class="spinner"></div>Fetching data from Google Sheets…</div>

  <div id="dashboard" style="display:none;">
    <div class="metrics-grid" id="metrics-grid"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <h3>Clicks per day</h3>
          <div class="chart-legend" id="legend-clicks"></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-clicks" role="img" aria-label="Daily clicks over selected date range"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <h3>Conversions per day</h3>
          <div class="chart-legend" id="legend-conv"></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-conv" role="img" aria-label="Daily conversions over selected date range"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <h3>Spend per day ($)</h3>
          <div class="chart-legend" id="legend-spend"></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-spend" role="img" aria-label="Daily spend over selected date range"></canvas></div>
      </div>
    </div>

    <div class="chart-card" style="margin-top: 1.25rem;">
      <div class="chart-header">
        <h3>Top keywords</h3>
        <span id="kw-period-label" style="font-size:12px; color:#9a9790;"></span>
      </div>
      <div style="overflow-x: auto;">
        <table id="kw-table" style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead>
            <tr style="background:#f5f4f0;">
              <th style="text-align:left; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">#</th>
              <th style="text-align:left; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">Keyword</th>
              <th style="text-align:left; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">Match</th>
              <th style="text-align:left; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">Campaign</th>
              <th style="text-align:right; padding:8px 12px; font-weight:500; color:#3d5a4c; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">Impressions ↓</th>
              <th style="text-align:right; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">Clicks</th>
              <th style="text-align:right; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">CTR</th>
              <th style="text-align:right; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">Spend</th>
              <th style="text-align:right; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">Conv.</th>
              <th style="text-align:right; padding:8px 12px; font-weight:500; color:#7a7265; border-bottom:0.5px solid #dddbd3; white-space:nowrap;">CPC</th>
            </tr>
          </thead>
          <tbody id="kw-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SHEET_ID    = '19hSIR_R6chkVcCcqvI7IIf31kM4gKaWaOSoQXnlUGE0';
const API_KEY     = 'AIzaSyBnqU-K9_nVT9QTl7EQ73AxUXQmJ9oqrC4';
const DAILY_SHEET    = 'Daily';
const KEYWORDS_SHEET = 'Keywords';

const PALETTE = {
  A: { line: '#3d5a4c', fill: 'rgba(61,90,76,0.08)',   dashed: false },
  B: { line: '#5a6e8a', fill: 'rgba(90,110,138,0.06)', dashed: true  },
};

let charts = {};
let comparing = false;

(function init() {
  const to = new Date(), from = new Date();
  from.setDate(from.getDate() - 30);
  document.getElementById('date-to').value   = fmtInput(to);
  document.getElementById('date-from').value = fmtInput(from);
  const toBp = new Date(from); toBp.setDate(toBp.getDate() - 1);
  const fromBp = new Date(toBp); fromBp.setDate(fromBp.getDate() - 30);
  document.getElementById('date-to-b').value   = fmtInput(toBp);
  document.getElementById('date-from-b').value = fmtInput(fromBp);
  loadData();
})();

function fmtInput(d) { return d.toISOString().slice(0, 10); }

function fillPeriodB() {
  const fromStr = document.getElementById('date-from').value;
  const toStr   = document.getElementById('date-to').value;
  if (!fromStr || !toStr) return;
  const fromA = new Date(fromStr);
  const toA   = new Date(toStr);
  const days  = Math.round((toA - fromA) / (1000 * 60 * 60 * 24)) + 1;
  const toBp   = new Date(fromA); toBp.setDate(toBp.getDate() - 1);
  const fromBp = new Date(toBp);  fromBp.setDate(fromBp.getDate() - (days - 1));
  document.getElementById('date-to-b').value   = fmtInput(toBp);
  document.getElementById('date-from-b').value = fmtInput(fromBp);
}

function toggleCompare() {
  comparing = !comparing;
  document.getElementById('compare-tick').textContent = comparing ? '☑' : '☐';
  document.getElementById('compare-toggle').classList.toggle('active', comparing);
  document.getElementById('compare-group').style.display = comparing ? 'flex' : 'none';
  if (comparing) fillPeriodB();
  loadData();
}

function setRange(days, btn) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const to = new Date(), from = new Date();
  from.setDate(from.getDate() - days);
  document.getElementById('date-to').value   = fmtInput(to);
  document.getElementById('date-from').value = fmtInput(from);
  if (comparing) fillPeriodB();
  loadData();
}

function setStatus(msg, isError) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

async function fetchRange(sheetName, range) {
  const enc = encodeURIComponent(`${sheetName}!${range}`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${enc}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  return (await res.json()).values || [];
}

async function loadData() {
  const fromStr = document.getElementById('date-from').value;
  const toStr   = document.getElementById('date-to').value;
  if (!fromStr || !toStr) return setStatus('Select a date range.', true);
  if (new Date(fromStr) > new Date(toStr)) return setStatus('Start date must be before end date.', true);

  document.getElementById('loader').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('load-btn').disabled = true;
  setStatus('');

  try {
    const [rows, kwRows] = await Promise.all([
      fetchRange(DAILY_SHEET, 'A:G'),
      fetchRange(KEYWORDS_SHEET, 'A:J'),
    ]);
    const dailyA = parseDailyRows(rows, new Date(fromStr), new Date(toStr));

    let dailyB = null;
    if (comparing) {
      const fromBStr = document.getElementById('date-from-b').value;
      const toBStr   = document.getElementById('date-to-b').value;
      if (fromBStr && toBStr) dailyB = parseDailyRows(rows, new Date(fromBStr), new Date(toBStr));
    }

    renderMetrics(dailyA, dailyB);
    renderCharts(dailyA, dailyB);
    renderKeywords(kwRows, fromStr, toStr);

    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const label = comparing && dailyB
      ? `Period A: ${fromStr} → ${toStr}  ·  Period B: ${document.getElementById('date-from-b').value} → ${document.getElementById('date-to-b').value}`
      : `Showing ${dailyA.length} days  ·  ${fromStr} → ${toStr}`;
    setStatus(label);
  } catch(e) {
    setStatus('Error: ' + e.message, true);
  } finally {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('load-btn').disabled = false;
  }
}

function parseDailyRows(rows, fromDate, toDate) {
  if (!rows.length) return [];
  return rows.slice(1)
    .map(r => ({ date: r[0]||'', impressions: parseNum(r[1]), clicks: parseNum(r[2]), ctr: parseNum(r[3]), cost: parseNum(r[4]), conversions: parseNum(r[5]), cpc: parseNum(r[6]) }))
    .filter(r => { if (!r.date) return false; const d = new Date(r.date); return d >= fromDate && d <= toDate; })
    .sort((a,b) => a.date.localeCompare(b.date));
}

function parseNum(v) { if (!v && v !== 0) return 0; return parseFloat(String(v).replace(/[$,%]/g,'')) || 0; }
function sum(arr, key) { return arr.reduce((a,r) => a + (r[key]||0), 0); }

function renderKeywords(rows, fromStr, toStr) {
  const tbody = document.getElementById('kw-tbody');
  const label = document.getElementById('kw-period-label');
  label.textContent = fromStr + ' → ' + toStr;

  if (!rows || rows.length <= 1) {
    tbody.innerHTML = '<tr><td colspan="10" style="padding:16px 12px; color:#9a9790; font-size:13px;">No keyword data — re-run the Google Ads script to populate the Keywords sheet.</td></tr>';
    return;
  }

  // rows[0] is header, skip it
  const data = rows.slice(1).map(r => ({
    keyword:     r[0] || '',
    match:       r[1] || '',
    campaign:    r[2] || '',
    adgroup:     r[3] || '',
    impressions: parseNum(r[4]),
    clicks:      parseNum(r[5]),
    ctr:         parseNum(r[6]),
    cost:        parseNum(r[7]),
    conv:        parseNum(r[8]),
    cpc:         parseNum(r[9]),
  })).sort((a, b) => b.impressions - a.impressions);

  const matchBadgeColor = { EXACT: '#eaf3de', PHRASE: '#faeeda', BROAD: '#e6f1fb' };
  const matchTextColor  = { EXACT: '#3b6d11', PHRASE: '#854f0b', BROAD: '#185fa5' };

  const MATCH_LABELS = { EXACT: 'Exact', PHRASE: 'Phrase', BROAD: 'Broad' };

  tbody.innerHTML = data.map((r, i) => {
    const matchKey = r.match.toUpperCase().replace(' ', '_');
    const bg   = matchBadgeColor[matchKey] || '#f1efe8';
    const tc   = matchTextColor[matchKey]  || '#7a7265';
    const rowBg = i % 2 === 0 ? '#faf9f7' : '#ffffff';
    const matchLabel = MATCH_LABELS[matchKey] || r.match;
    // Truncate long campaign names
    const camp = r.campaign.length > 35 ? r.campaign.slice(0, 33) + '…' : r.campaign;
    return `<tr style="background:${rowBg};">
      <td style="padding:8px 12px; color:#9a9790;">${i+1}</td>
      <td style="padding:8px 12px; font-weight:500; color:#1a1a18;">${r.keyword}</td>
      <td style="padding:8px 12px;"><span style="font-size:11px; padding:2px 7px; border-radius:4px; background:${bg}; color:${tc}; font-weight:500;">${matchLabel}</span></td>
      <td style="padding:8px 12px; color:#7a7265; font-size:12px;" title="${r.campaign}">${camp}</td>
      <td style="padding:8px 12px; text-align:right; font-weight:500; color:#1a1a18;">${r.impressions.toLocaleString()}</td>
      <td style="padding:8px 12px; text-align:right;">${r.clicks.toLocaleString()}</td>
      <td style="padding:8px 12px; text-align:right;">${r.ctr.toFixed(2)}%</td>
      <td style="padding:8px 12px; text-align:right;">$${r.cost.toFixed(2)}</td>
      <td style="padding:8px 12px; text-align:right;">${r.conv.toFixed(1)}</td>
      <td style="padding:8px 12px; text-align:right;">$${r.cpc.toFixed(2)}</td>
    </tr>`;
  }).join('');
}

function pctDelta(a, b) {
  if (!b || b === 0) return null;
  return ((a - b) / b * 100);
}

function deltaBadge(a, b, invertSign) {
  const pct = pctDelta(a, b);
  if (pct === null) return '';
  const positive = invertSign ? pct < 0 : pct > 0;
  const cls = Math.abs(pct) < 0.5 ? 'flat' : positive ? 'up' : 'down';
  const sign = pct > 0 ? '+' : '';
  return `<span class="delta-badge ${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

function renderMetrics(dailyA, dailyB) {
  const impA  = sum(dailyA, 'impressions'), clkA = sum(dailyA, 'clicks');
  const costA = sum(dailyA, 'cost'),        convA = sum(dailyA, 'conversions');
  const ctrA  = impA  > 0 ? clkA/impA*100 : 0;
  const cpcA  = clkA  > 0 ? costA/clkA    : 0;
  const cpaA  = convA > 0 ? costA/convA   : 0;

  let impB=0, clkB=0, costB=0, convB=0, ctrB=0, cpcB=0, cpaB=0;
  if (dailyB) {
    impB  = sum(dailyB,'impressions'); clkB = sum(dailyB,'clicks');
    costB = sum(dailyB,'cost');        convB = sum(dailyB,'conversions');
    ctrB  = impB  > 0 ? clkB/impB*100 : 0;
    cpcB  = clkB  > 0 ? costB/clkB    : 0;
    cpaB  = convB > 0 ? costB/convB   : 0;
  }

  const cards = [
    { label:'Impressions',   vA: impA.toLocaleString(),          vB: impB.toLocaleString(),          delta: deltaBadge(impA,impB,false) },
    { label:'Clicks',        vA: clkA.toLocaleString(),          vB: clkB.toLocaleString(),          delta: deltaBadge(clkA,clkB,false) },
    { label:'CTR',           vA: ctrA.toFixed(2)+'%',            vB: ctrB.toFixed(2)+'%',            delta: deltaBadge(ctrA,ctrB,false) },
    { label:'Spend',         vA: '$'+costA.toFixed(2),           vB: '$'+costB.toFixed(2),           delta: deltaBadge(costA,costB,true) },
    { label:'Conversions',   vA: convA.toFixed(1),               vB: convB.toFixed(1),               delta: deltaBadge(convA,convB,false) },
    { label:'CPC',           vA: '$'+cpcA.toFixed(2),            vB: '$'+cpcB.toFixed(2),            delta: deltaBadge(cpcA,cpcB,true) },
    { label:'Cost per conv', vA: convA>0?'$'+cpaA.toFixed(2):'—', vB: convB>0?'$'+cpaB.toFixed(2):'—', delta: deltaBadge(cpaA,cpaB,true) },
  ];

  document.getElementById('metrics-grid').innerHTML = cards.map(c => `
    <div class="metric-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.vA}</div>
      ${dailyB ? `<div class="compare-row"><span class="comp-val">${c.vB}</span>${c.delta}</div>` : ''}
    </div>
  `).join('');
}

function renderCharts(dailyA, dailyB) {
  const labelsA = dailyA.map(r => fmtAxisDate(r.date));

  buildLegend('legend-clicks', dailyB);
  buildLegend('legend-conv',   dailyB);
  buildLegend('legend-spend',  dailyB);

  drawChart('chart-clicks', labelsA, dailyA.map(r=>r.clicks),
    dailyB, dailyB?.map(r=>r.clicks), 'Clicks', false);
  drawChart('chart-conv', labelsA, dailyA.map(r=>parseFloat(r.conversions.toFixed(1))),
    dailyB, dailyB?.map(r=>parseFloat(r.conversions.toFixed(1))), 'Conversions', false);
  drawChart('chart-spend', labelsA, dailyA.map(r=>parseFloat(r.cost.toFixed(2))),
    dailyB, dailyB?.map(r=>parseFloat(r.cost.toFixed(2))), 'Spend ($)', true);
}

function buildLegend(elId, dailyB) {
  const fromA = document.getElementById('date-from').value;
  const toA   = document.getElementById('date-to').value;
  const fromB = document.getElementById('date-from-b').value;
  const toB   = document.getElementById('date-to-b').value;
  if (!dailyB) { document.getElementById(elId).innerHTML = ''; return; }
  document.getElementById(elId).innerHTML = `
    <span class="legend-item"><span class="legend-dot" style="background:${PALETTE.A.line}"></span>${fromA} → ${toA}</span>
    <span class="legend-item"><span class="legend-dot" style="background:${PALETTE.B.line}; opacity:0.7"></span>${fromB} → ${toB}</span>
  `;
}

function drawChart(id, labelsA, dataA, dailyB, dataB, label, isCurrency) {
  if (charts[id]) charts[id].destroy();

  const datasets = [{
    label: 'Period A',
    data: dataA,
    borderColor: PALETTE.A.line,
    backgroundColor: PALETTE.A.fill,
    borderWidth: 1.5,
    pointRadius: dataA.length > 45 ? 0 : 3,
    pointHoverRadius: 5,
    pointBackgroundColor: PALETTE.A.line,
    fill: true,
    tension: 0.3,
  }];

  if (dailyB && dataB) {
    const labelsB = dailyB.map(r => fmtAxisDate(r.date));
    datasets.push({
      label: 'Period B',
      data: dataB,
      borderColor: PALETTE.B.line,
      backgroundColor: PALETTE.B.fill,
      borderWidth: 1.5,
      borderDash: [4, 3],
      pointRadius: dataB.length > 45 ? 0 : 3,
      pointHoverRadius: 5,
      pointStyle: 'rectRot',
      pointBackgroundColor: PALETTE.B.line,
      fill: false,
      tension: 0.3,
      xAxisID: 'xB',
    });
  }

  const scales = {
    x: {
      grid: { color: 'rgba(0,0,0,0.04)' },
      ticks: { font:{size:11}, color:'#9a9790', maxRotation:0, autoSkip:true, maxTicksLimit:10 },
      border: { color: '#dddbd3' },
      labels: labelsA,
    },
    y: {
      grid: { color: 'rgba(0,0,0,0.04)' },
      ticks: { font:{size:11}, color:'#9a9790', callback: v => isCurrency ? '$'+v.toFixed(0) : v.toLocaleString() },
      border: { color: '#dddbd3' },
      beginAtZero: true,
    }
  };

  if (dailyB && dataB) {
    scales.xB = {
      display: false,
      labels: dailyB.map(r => fmtAxisDate(r.date)),
    };
  }

  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { labels: labelsA, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#dddbd3',
          borderWidth: 1,
          titleColor: '#7a7265',
          bodyColor: '#1a1a18',
          titleFont: { size: 11 },
          bodyFont: { size: 13, weight: '500' },
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              const prefix = ctx.dataset.label === 'Period B' ? 'B: ' : 'A: ';
              if (isCurrency) return ' ' + prefix + '$' + v.toFixed(2);
              return ' ' + prefix + (Number.isInteger(v) ? v.toLocaleString() : v.toFixed(1));
            }
          }
        }
      },
      scales,
    }
  });
}

function fmtAxisDate(str) {
  return new Date(str).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}
</script>
</body>
</html>
